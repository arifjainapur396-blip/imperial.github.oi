<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Section</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#ffffff}

/* HEADER */
header{
  background:#002147;
  color:rgb(255, 255, 255);
  padding:25px 10%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:28px;
  position:relative;
}

header h1::after{
  content:"";
  width:60px;
  height:3px;
  background:#ffcc00;
  position:absolute;
  bottom:-8px;
  left:0;
}

.back-btn{
  color:white;
  text-decoration:none;
  font-size:16px;
}

/* SECTION */
section{padding:80px 10%;text-align:center}
h1{color:#fcfdff;font-size:40px}
p{color:#666;margin:10px 0 40px}

/* TABS */
.tabs{display:flex;justify-content:center;gap:15px;margin-bottom:40px;flex-wrap:wrap}
.tabs button{
  padding:10px 20px;
  border:none;
  background:#ddd;
  border-radius:20px;
  cursor:pointer;
}
.tabs button.active{
  background:#002147;
  color:#fff;
}

/* GRID */
.grid{
  display:none;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}
.grid.active{display:grid}

/* CARD */
.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:translateY(-8px)}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card h3{color:#002147;margin:10px}
.card p{font-size:14px;margin-bottom:15px}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup-box{
  background:#fff;
  padding:30px;
  border-radius:20px;
  max-width:400px;
}
.popup-box img{
  width:120px;
  border-radius:50%;
  margin-bottom:10px;
}

/* VIDEO */
.slider{max-width:900px;margin:auto;position:relative}
.slide{position:absolute;width:100%;opacity:0;transition:0.8s}
.slide.active{opacity:1;position:relative}
.slide iframe{width:100%;height:400px;border-radius:20px}

.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#002147;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
.prev{left:-20px}
.next{right:-20px}

@media(max-width:768px){
.slide iframe{height:250px}
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>Faculty of Imperial College</h1>
  <a href="index.html" class="back-btn">← Back</a>
</header>

<section>
<h1>Our Faculty</h1>
<p>Explore departments and expert teachers</p>

<div class="tabs">
<button class="active" onclick="showTab(0)">Physics</button>
<button onclick="showTab(1)">Chemistry</button>
<button onclick="showTab(2)">Biology</button>
<button onclick="showTab(3)">Mathematics</button>
</div>

<!-- Physics -->
<div class="grid active">
<div class="card" onclick="openPopup('Dr. Rajesh','Physics Expert','20+ Years','https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=400&q=80')">
<img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=600&q=80">
<h3>Dr. Rajesh</h3>
<p>Physics Expert</p>
</div>
</div>

<!-- Chemistry -->
<div class="grid">
<div class="card" onclick="openPopup('Anita Verma','Chemistry','10+ Years','https://images.unsplash.com/photo-1595152772835-219674b2a8a6?auto=format&fit=crop&w=400&q=80')">
<img src="https://images.unsplash.com/photo-1595152772835-219674b2a8a6?auto=format&fit=crop&w=600&q=80">
<h3>Anita Verma</h3>
<p>Chemistry Faculty</p>
</div>
</div>

<!-- Biology -->
<div class="grid">
<div class="card" onclick="openPopup('Sneha Patil','Biology','12+ Years','https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&w=400&q=80')">
<img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&w=600&q=80">
<h3>Sneha Patil</h3>
<p>Biology Faculty</p>
</div>
</div>

<!-- Mathematics -->
<div class="grid">
<div class="card" onclick="openPopup('Rahul Singh','Mathematics','8+ Years','https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=400&q=80')">
<img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=600&q=80">
<h3>Rahul Singh</h3>
<p>Mathematics Faculty</p>
</div>
</div>

</section>

<section>
<h1>Faculty Videos</h1>
<p>Watch teaching demos</p>

<div class="slider">
<div class="slide active"><iframe src=""></iframe></div>
<div class="slide"><iframe src=""></iframe></div>

<button class="btn prev" onclick="prev()">❮</button>
<button class="btn next" onclick="next()">❯</button>
</div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box" id="popupBox"></div>
</div>

<script>
function showTab(n){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
document.querySelectorAll('.tabs button')[n].classList.add('active');
document.querySelectorAll('.grid')[n].classList.add('active');
}

function openPopup(name,sub,exp,img){
document.getElementById('popup').style.display='flex';
document.getElementById('popupBox').innerHTML=
`<img src="${img}">
<h2>${name}</h2>
<p>${sub}</p>
<p>${exp}</p>`;
}

document.getElementById('popup').onclick=()=>document.getElementById('popup').style.display='none';

let i=0;
const slides=document.querySelectorAll('.slide');

function show(n){
slides.forEach(s=>s.classList.remove('active'));
slides[n].classList.add('active');
}

function next(){i=(i+1)%slides.length;show(i)}
function prev(){i=(i-1+slides.length)%slides.length;show(i)}

setInterval(next,5000);
</script>

</body>
</html>
